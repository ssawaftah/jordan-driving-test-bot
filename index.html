<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الفحص النظري</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #1a6b3c;
            --primary-dark: #145a30;
            --primary-light: #e8f5e9;
            --gold: #c9a84c;
            --text: #1a1a1a;
            --text-light: #666666;
            --bg: #ffffff;
            --bg-secondary: #f5f5f7;
            --card-bg: #fafafa;
            --border: #e8e8e8;
            --radius: 16px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            direction: rtl;
            text-align: right;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg);
            min-height: 100vh;
            position: relative;
        }

        .app-header {
            background: #fff;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-logo {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-subtitle { font-size: 11px; color: var(--text-light); }

        .screen {
            display: none;
            padding: 24px 20px;
            animation: fadeIn 0.4s ease;
        }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } }

        .hero-icon {
            width: 80px; height: 80px;
            background: var(--primary-light);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 20px auto;
            font-size: 40px;
        }
        .main-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: var(--text-light); margin-bottom: 24px; font-size: 14px; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 16px; border-radius: var(--radius);
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            font-family: 'Tajawal', sans-serif; transition: var(--transition);
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:active { background: var(--primary-dark); }
        .btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
        .btn-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 18px; margin: 12px 0; border-radius: var(--radius);
            display: flex; align-items: center; gap: 14px;
            font-size: 15px; font-weight: 600; cursor: pointer;
        }

        .form-group { margin-bottom: 20px; }
        .form-input {
            width: 100%; padding: 15px; border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 15px; background: var(--card-bg);
        }

        .success-box {
            background: #e8f5e9; padding: 12px; border-radius: 12px;
            color: #2e7d32; font-weight: 600; margin: 10px 0;
        }

        .error-message {
            background: #fff5f5; padding: 12px; border-radius: 12px;
            color: #c53030; font-size: 14px; margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-brand">
                <div class="header-logo">🚗</div>
                <div>
                    <div class="header-title">الفحص النظري</div>
                    <div class="header-subtitle">دائرة الترخيص</div>
                </div>
            </div>
        </header>

        <div id="landingScreen" class="screen active">
            <div class="hero-icon">📋</div>
            <h1 class="main-title">اختبار الفحص النظري</h1>
            <p class="subtitle">دراسة مصنفة حسب الأقسام، محاكاة واقعية، ومراكز تدريب قريبة منك.</p>
            <button class="btn btn-primary" onclick="handleStart()">ابدأ</button>
        </div>

        <div id="registerScreen" class="screen">
            <h2 style="text-align:center; margin-bottom:24px;">أدخل بياناتك</h2>
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" class="form-input" id="fullName" placeholder="أدخل اسمك">
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" class="form-input" id="phoneInput" placeholder="مثال: 0791234567">
            </div>
            
            <div id="verificationStatus" class="success-box" style="display:none;">
                <i class="ph ph-check-circle"></i> <span id="statusText">تم إرسال رمز التحقق...</span>
            </div>

            <div id="errorMessage" class="error-message" style="display:none;"></div>

            <button class="btn btn-outline" onclick="sendVerificationCode()" id="sendCodeBtn">
                <i class="ph ph-paper-plane"></i> تحقق
            </button>

            <button class="btn btn-primary" id="registerBtn" onclick="completeRegistration()" style="margin-top:20px;" disabled>
                موافق
            </button>
        </div>

        <div id="homeScreen" class="screen">
            <div class="hero-icon">🏠</div>
            <h2 class="main-title">مرحباً!</h2>
            <p class="subtitle" id="greetingText">أهلاً بك في المنصة</p>
            <div class="btn-card">📝 الامتحان النظري الحي</div>
            <div class="btn-card">📚 دراسة الأسئلة</div>
            <div class="btn-card">📍 مراكز التدريب</div>
        </div>
    </div>

    <script>
        // Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyDsN-OmtB-XFKGsYmX6zh_VvInCyE-rKtk",
            databaseURL: "https://al3arbicv-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "al3arbicv"
        });
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const WORKER_URL = "https://jordan-driving-test-bot.pages.dev";

        let phoneNumber = '';
        let isPhoneVerified = false;
        let currentScreen = 'landingScreen';
        let verificationListener = null;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (currentScreen === 'registerScreen' && id !== 'registerScreen') stopVerificationListener();
            currentScreen = id;
        }

        async function checkUserRegistration() {
            if (tg.initDataUnsafe?.user?.id) {
                const snap = await db.ref('users/' + tg.initDataUnsafe.user.id).once('value');
                if (snap.val()) return true;
            }
            return false;
        }

        async function handleStart() {
            if (await checkUserRegistration()) showScreen('homeScreen');
            else showScreen('registerScreen');
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            if (el) {
                el.textContent = msg;
                el.style.display = 'block';
            }
        }

        function hideError() {
            const el = document.getElementById('errorMessage');
            if (el) el.style.display = 'none';
        }

        function stopVerificationListener() {
            if (verificationListener) {
                const userId = tg.initDataUnsafe?.user?.id;
                if (userId) db.ref(`pendingVerifications/${userId}`).off('value', verificationListener);
                verificationListener = null;
            }
        }

        async function sendVerificationCode() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone || phone.length < 10) {
                showError('الرجاء إدخال رقم هاتف صحيح');
                return;
            }

            if (!tg.initDataUnsafe?.user?.id) {
                showError('تعذر التحقق من حسابك');
                return;
            }

            hideError();
            const btn = document.getElementById('sendCodeBtn');
            btn.innerHTML = '<i class="ph ph-spinner"></i> جارٍ التحقق...';
            btn.disabled = true;

            try {
                const res = await fetch(`${WORKER_URL}/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, phone })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('verificationStatus').style.display = 'block';
                    document.getElementById('statusText').textContent = 'تم إرسال رمز التحقق. جاري التحقق التلقائي...';
                    btn.style.display = 'none';
                    showError('');
                    startListeningForVerificationCode();
                } else {
                    showError(data.error || 'فشل في إرسال الرمز');
                    btn.innerHTML = '<i class="ph ph-paper-plane"></i> تحقق';
                    btn.disabled = false;
                }
            } catch (e) {
                showError('خطأ في الاتصال.');
                btn.innerHTML = '<i class="ph ph-paper-plane"></i> تحقق';
                btn.disabled = false;
            }
        }

        function startListeningForVerificationCode() {
            const userId = tg.initDataUnsafe.user.id;
            stopVerificationListener();
            verificationListener = db.ref(`pendingVerifications/${userId}`).on('value', async (snap) => {
                const data = snap.val();
                if (data) {
                    const { code, phone: verifiedPhone } = data;
                    db.ref(`pendingVerifications/${userId}`).off('value', verificationListener);
                    verificationListener = null;

                    document.getElementById('statusText').textContent = 'جاري تأكيد الرقم...';

                    try {
                        const res = await fetch(`${WORKER_URL}/verify-code`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId, code })
                        });
                        const result = await res.json();
                        if (result.success) {
                            phoneNumber = result.phone || verifiedPhone;
                            isPhoneVerified = true;
                            document.getElementById('verificationStatus').style.display = 'none';
                            document.getElementById('registerBtn').disabled = false;
                            tg.showAlert('✅ تم التحقق من رقم هاتفك بنجاح!');
                        } else {
                            showError(result.error || 'فشل التحقق');
                            document.getElementById('sendCodeBtn').style.display = 'block';
                            document.getElementById('sendCodeBtn').innerHTML = '<i class="ph ph-paper-plane"></i> تحقق';
                            document.getElementById('sendCodeBtn').disabled = false;
                            document.getElementById('verificationStatus').style.display = 'none';
                        }
                    } catch (e) {
                        showError('خطأ في الاتصال أثناء التحقق');
                    }
                }
            });
        }

        async function completeRegistration() {
            const name = document.getElementById('fullName').value.trim();
            if (!name) { showError('الرجاء إدخال اسمك الكامل'); return; }
            if (!isPhoneVerified) { showError('الرجاء تأكيد رقم الهاتف أولاً'); return; }

            const userId = tg.initDataUnsafe.user.id;
            try {
                await db.ref('users/' + userId).set({
                    name,
                    phone: phoneNumber,
                    username: tg.initDataUnsafe.user.username || '',
                    userId,
                    registeredAt: new Date().toISOString()
                });
                document.getElementById('greetingText').textContent = 'أهلاً بك، ' + name;
                showScreen('homeScreen');
            } catch (e) {
                showError('حدث خطأ في التسجيل');
            }
        }

        if (tg.initDataUnsafe?.user?.first_name) {
            document.getElementById('fullName').value = tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
