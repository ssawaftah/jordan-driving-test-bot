<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الفحص النظري</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #1a6b3c;
            --primary-dark: #145a30;
            --primary-light: #e8f5e9;
            --gold: #c9a84c;
            --text: #1a1a1a;
            --text-light: #666666;
            --bg: #ffffff;
            --bg-secondary: #f5f5f7;
            --card-bg: #fafafa;
            --border: #e8e8e8;
            --radius: 16px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            direction: rtl;
            text-align: right;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg);
            min-height: 100vh;
            position: relative;
        }

        .app-header {
            background: #fff;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-logo {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-subtitle { font-size: 11px; color: var(--text-light); }

        .screen {
            display: none;
            padding: 24px 20px;
            animation: fadeIn 0.4s ease;
        }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } }

        .hero-icon {
            width: 80px; height: 80px;
            background: var(--primary-light);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 20px auto;
            font-size: 40px;
        }
        .main-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: var(--text-light); margin-bottom: 24px; font-size: 14px; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 16px; border-radius: var(--radius);
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            font-family: 'Tajawal', sans-serif; transition: var(--transition);
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:active { background: var(--primary-dark); }
        .btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
        .btn-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 18px; margin: 12px 0; border-radius: var(--radius);
            display: flex; align-items: center; gap: 14px;
            font-size: 15px; font-weight: 600; cursor: pointer;
        }

        .form-group { margin-bottom: 20px; }
        .form-input {
            width: 100%; padding: 15px; border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 15px; background: var(--card-bg);
        }

        .success-box {
            background: #e8f5e9; padding: 12px; border-radius: 12px;
            color: #2e7d32; font-weight: 600; margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-brand">
                <div class="header-logo">🚗</div>
                <div>
                    <div class="header-title">الفحص النظري</div>
                    <div class="header-subtitle">دائرة الترخيص</div>
                </div>
            </div>
        </header>

        <div id="landingScreen" class="screen active">
            <div class="hero-icon">📋</div>
            <h1 class="main-title">اختبار الفحص النظري</h1>
            <p class="subtitle">دراسة مصنفة حسب الأقسام، محاكاة واقعية، ومراكز تدريب قريبة منك.</p>
            <button class="btn btn-primary" onclick="handleStart()">ابدأ</button>
        </div>

        <div id="registerScreen" class="screen">
            <h2 style="text-align:center; margin-bottom:24px;">أدخل بياناتك</h2>
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" class="form-input" id="fullName" placeholder="أدخل اسمك">
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <div id="phoneDisplay"></div>
                <button class="btn btn-outline" onclick="requestPhoneViaBot()" id="phoneBtn">
                    <i class="ph ph-phone"></i> مشاركة رقم الهاتف
                </button>
            </div>
            <button class="btn btn-primary" id="registerBtn" onclick="completeRegistration()">موافق</button>
        </div>

        <div id="homeScreen" class="screen">
            <div class="hero-icon">🏠</div>
            <h2 class="main-title">مرحباً!</h2>
            <p class="subtitle" id="greetingText">أهلاً بك في المنصة</p>
            <div class="btn-card">📝 الامتحان النظري الحي</div>
            <div class="btn-card">📚 دراسة الأسئلة</div>
            <div class="btn-card">📍 مراكز التدريب</div>
        </div>
    </div>

    <script>
        // Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyDsN-OmtB-XFKGsYmX6zh_VvInCyE-rKtk",
            databaseURL: "https://al3arbicv-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "al3arbicv"
        });
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let phoneNumber = '';
        let isPhoneVerified = false;
        let currentScreen = 'landingScreen';
        let phoneCheckInterval = null;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (currentScreen === 'registerScreen' && id !== 'registerScreen') stopPhoneCheck();
            currentScreen = id;
        }

        async function checkUserRegistration() {
            if (tg.initDataUnsafe?.user?.id) {
                const snap = await db.ref('users/' + tg.initDataUnsafe.user.id).once('value');
                if (snap.val()) return true;
            }
            return false;
        }

        async function handleStart() {
            if (await checkUserRegistration()) showScreen('homeScreen');
            else showScreen('registerScreen');
        }

        function requestPhoneViaBot() {
            tg.openTelegramLink('https://t.me/Jordan_Driving_Test_2026_Bot?start=share_phone');
            document.getElementById('phoneBtn').style.display = 'none';
            document.getElementById('phoneDisplay').innerHTML = '<p style="color:#e65100;">⏳ تابع التعليمات في البوت ثم عد للتطبيق</p>';
            startPhoneCheckInterval();
        }

        function startPhoneCheckInterval() {
            if (phoneCheckInterval) clearInterval(phoneCheckInterval);
            phoneCheckInterval = setInterval(checkPhoneSaved, 2000);
        }

        function stopPhoneCheck() {
            if (phoneCheckInterval) { clearInterval(phoneCheckInterval); phoneCheckInterval = null; }
        }

        async function checkPhoneSaved() {
            if (!tg.initDataUnsafe?.user?.id) return;
            const snap = await db.ref('users/' + tg.initDataUnsafe.user.id + '/phone').once('value');
            const phone = snap.val();
            if (phone) {
                stopPhoneCheck();
                phoneNumber = phone;
                isPhoneVerified = true;
                document.getElementById('phoneDisplay').innerHTML = '<div class="success-box">✅ تم التحقق من الرقم</div>';
                document.getElementById('registerBtn').style.display = 'flex';
            }
        }

        async function completeRegistration() {
            const name = document.getElementById('fullName').value.trim();
            if (!name) { alert('أدخل الاسم'); return; }
            if (!isPhoneVerified) { alert('شارك رقم الهاتف أولاً'); return; }

            const userId = tg.initDataUnsafe.user.id;
            await db.ref('users/' + userId).set({
                name, phone: phoneNumber,
                username: tg.initDataUnsafe.user.username || '',
                registeredAt: new Date().toISOString()
            });
            document.getElementById('greetingText').textContent = 'أهلاً بك، ' + name;
            showScreen('homeScreen');
        }

        if (tg.initDataUnsafe?.user?.first_name) {
            document.getElementById('fullName').value = tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
