<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرف - الفحص النظري</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #1E3A5F;
            --gold: #F59E0B;
            --text: #F1F5F9;
            --text-light: #94A3B8;
            --bg: #0F172A;
            --bg-secondary: #1E293B;
            --card-bg: #1E293B;
            --border: #334155;
            --danger: #EF4444;
            --danger-light: #7F1D1D;
            --success: #10B981;
            --radius: 20px;
            --radius-sm: 14px;
            --transition: all 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            direction: rtl;
            text-align: right;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }

        .admin-header {
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-brand { display: flex; align-items: center; gap: 12px; }
        .admin-logo {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
        }
        .admin-title { font-size: 17px; font-weight: 800; }
        .admin-subtitle { font-size: 11px; color: var(--text-light); margin-top: 2px; }

        .screen {
            display: none;
            padding: 20px;
            animation: fadeIn 0.35s ease;
        }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
        }

        .stat-value { font-size: 28px; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

        .btn {
            width: 100%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: 'Tajawal', sans-serif; transition: var(--transition);
            border-radius: 16px;
            font-size: 15px; font-weight: 700;
            padding: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            color: white;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
        }
        .btn-primary:active { opacity: 0.85; transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:active { background: var(--bg-secondary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; border-radius: 12px; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-light); }
        .form-input {
            width: 100%; height: 52px;
            padding: 0 16px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            transition: .2s;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        textarea.form-input { height: auto; padding: 14px; min-height: 100px; resize: vertical; }
        select.form-input { appearance: none; -webkit-appearance: none; }

        .list-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
            transition: var(--transition);
            gap: 10px;
        }
        .list-item:active { background: var(--bg-secondary); }
        .list-item span { flex: 1; }

        .back-btn {
            background: none; border: none;
            color: var(--primary);
            font-family: 'Tajawal', sans-serif;
            font-weight: 700; font-size: 14px;
            cursor: pointer; padding: 8px 0;
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 6px;
        }

        .selection-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            font-weight: 700;
            font-size: 16px;
        }
        .selection-card:active { background: var(--bg-secondary); border-color: var(--primary); }

        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 999;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .confirm-box {
            background: var(--danger-light);
            border: 1px solid var(--danger);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin: 10px 0;
            text-align: center;
            flex: 1;
        }

        /* ============ بطاقات المستخدمين ============ */
        .user-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 12px;
        }

        .user-card .user-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .user-card .user-avatar {
            width: 48px; height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800;
            flex-shrink: 0;
        }

        .user-card .user-info {
            flex: 1;
        }

        .user-card .user-name {
            font-size: 16px; font-weight: 700;
        }

        .user-card .user-phone {
            font-size: 13px; color: var(--text-light);
            margin-top: 2px;
        }

        .user-card .user-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 14px;
        }

        .user-card .user-details div {
            background: var(--bg-secondary);
            padding: 10px 12px;
            border-radius: 10px;
        }

        .user-card .user-details span {
            color: var(--text);
            font-weight: 600;
            display: block;
            margin-top: 2px;
            font-size: 13px;
        }

        .user-card .user-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 15px;
        }

        .user-count-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="container">

    <header class="admin-header">
        <div class="admin-brand">
            <div class="admin-logo"><i class="ph ph-shield-check"></i></div>
            <div>
                <div class="admin-title">لوحة التحكم</div>
                <div class="admin-subtitle">إدارة مراكز التدريب</div>
            </div>
        </div>
    </header>

    <!-- الشاشة الرئيسية -->
    <div id="mainScreen" class="screen active">
        <div class="stat-grid">
            <div class="stat-card"><div class="stat-value" id="govCount">0</div><div class="stat-label">محافظة</div></div>
            <div class="stat-card"><div class="stat-value" id="areaCount">0</div><div class="stat-label">منطقة</div></div>
            <div class="stat-card"><div class="stat-value" id="centerCount">0</div><div class="stat-label">مركز تدريب</div></div>
            <div class="stat-card"><div class="stat-value" id="userCount">0</div><div class="stat-label">مستخدم</div></div>
        </div>

        <button class="btn btn-primary" onclick="showWelcomeManager()" style="margin-bottom:12px;">⚙️ إدارة رسالة الترحيب</button>
        <button class="btn btn-primary" onclick="showUsersManager()" style="margin-bottom:12px;">👥 إدارة المستخدمين</button>
        <button class="btn btn-primary" onclick="showAddForm('governorate')" style="margin-bottom:12px;">➕ إضافة محافظة</button>
        <button class="btn btn-primary" onclick="showAddForm('area')" style="margin-bottom:12px;">➕ إضافة منطقة</button>
        <button class="btn btn-primary" onclick="showAddForm('center')" style="margin-bottom:12px;">➕ إضافة مركز</button>
        <button class="btn btn-outline" onclick="showEditMenu()" style="margin-bottom:12px;">✏️ تعديل</button>
        <button class="btn btn-outline" onclick="showDeleteMenu()" style="margin-bottom:12px;">🗑 حذف</button>
    </div>

    <!-- شاشة إدارة الترحيب -->
    <div id="welcomeScreen" class="screen">
        <button class="back-btn" onclick="showMain()"><i class="ph ph-arrow-right"></i> رجوع للقائمة الرئيسية</button>
        <h3 style="margin-bottom:16px;">⚙️ إدارة رسالة الترحيب</h3>
        <div class="form-group"><label class="form-label">نص الترحيب (يدعم HTML)</label><textarea class="form-input" id="welcomeText" rows="5"></textarea></div>
        <div class="form-group"><label class="form-label">رابط الصورة</label><input type="text" class="form-input" id="welcomePhoto" placeholder="https://..."></div>
        <button class="btn btn-primary" onclick="saveWelcome()" style="margin-bottom:12px;">💾 حفظ</button>
        <button class="btn btn-outline" onclick="resetWelcome()">🔄 إعادة للافتراضي</button>
    </div>

    <!-- شاشة إدارة المستخدمين -->
    <div id="usersScreen" class="screen">
        <button class="back-btn" onclick="showMain()"><i class="ph ph-arrow-right"></i> رجوع للقائمة الرئيسية</button>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <h3>👥 إدارة المستخدمين</h3>
            <span class="user-count-badge" id="userCountBadge">0 مستخدم</span>
        </div>
        <div id="usersList"></div>
    </div>

    <!-- شاشة الإضافة -->
    <div id="addScreen" class="screen">
        <button class="back-btn" onclick="showMain()"><i class="ph ph-arrow-right"></i> رجوع للقائمة الرئيسية</button>
        <div id="addFormContent"></div>
    </div>

    <!-- شاشة التعديل -->
    <div id="editScreen" class="screen">
        <button class="back-btn" onclick="showMain()"><i class="ph ph-arrow-right"></i> رجوع للقائمة الرئيسية</button>
        <div id="editContent"></div>
    </div>

    <!-- شاشة الحذف -->
    <div id="deleteScreen" class="screen">
        <button class="back-btn" onclick="showMain()"><i class="ph ph-arrow-right"></i> رجوع للقائمة الرئيسية</button>
        <div id="deleteContent"></div>
    </div>

    <!-- تحميل -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
        <p style="font-weight:600;" id="loadingText">جارٍ التحميل...</p>
    </div>

</div>

<script>
    // ============ Firebase ============
    firebase.initializeApp({
        apiKey: "AIzaSyDsN-OmtB-XFKGsYmX6zh_VvInCyE-rKtk",
        databaseURL: "https://al3arbicv-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "al3arbicv"
    });
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const WORKER_URL = "https://jordan-driving-test-bot.pages.dev";
    let allGovs = {}, allAreas = {}, allCenters = {};

    // ============ دوال عامة ============
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
    }

    function showMain() {
        showScreen('mainScreen');
        loadStats();
    }

    function showLoading(text = 'جارٍ التحميل...') {
        document.getElementById('loadingText').textContent = text;
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function loadData() {
        try {
            const [govSnap, areaSnap, centerSnap] = await Promise.all([
                db.ref('governorates').once('value'),
                db.ref('areas').once('value'),
                db.ref('centers').once('value')
            ]);
            allGovs = govSnap.val() || {};
            allAreas = areaSnap.val() || {};
            allCenters = centerSnap.val() || {};
        } catch(e) { console.error(e); }
    }

    async function loadStats() {
        await loadData();
        document.getElementById('govCount').textContent = Object.keys(allGovs).length;
        document.getElementById('areaCount').textContent = Object.keys(allAreas).length;
        document.getElementById('centerCount').textContent = Object.keys(allCenters).length;
        
        // تحميل عدد المستخدمين
        try {
            const snap = await db.ref('users').once('value');
            const users = snap.val() || {};
            document.getElementById('userCount').textContent = Object.keys(users).length;
        } catch(e) {}
    }

    // ============ إدارة الترحيب ============
    async function showWelcomeManager() {
        showScreen('welcomeScreen');
        const snap = await db.ref('welcome').once('value');
        const data = snap.val() || {};
        document.getElementById('welcomeText').value = data.text || '';
        document.getElementById('welcomePhoto').value = data.photo || '';
    }

    async function saveWelcome() {
        const text = document.getElementById('welcomeText').value;
        const photo = document.getElementById('welcomePhoto').value.trim();
        await db.ref('welcome').set({ text, photo: photo || null });
        tg.showAlert('✅ تم الحفظ بنجاح!');
    }

    async function resetWelcome() {
        await db.ref('welcome').set({ text: '', photo: null });
        document.getElementById('welcomeText').value = '';
        document.getElementById('welcomePhoto').value = '';
        tg.showAlert('✅ تمت الإعادة للافتراضي!');
    }

    // ============ إدارة المستخدمين ============
    async function showUsersManager() {
        showScreen('usersScreen');
        await loadUsers();
    }

    async function loadUsers() {
        showLoading('جاري تحميل المستخدمين...');
        try {
            const snap = await db.ref('users').once('value');
            const users = snap.val() || {};
            renderUsers(users);
        } catch(e) {
            document.getElementById('usersList').innerHTML = `
                <div class="empty-state">
                    <i class="ph ph-warning-circle"></i>
                    <p>حدث خطأ في تحميل البيانات</p>
                </div>
            `;
        }
        hideLoading();
    }

    function renderUsers(users) {
        const container = document.getElementById('usersList');
        const entries = Object.entries(users);
        
        document.getElementById('userCountBadge').textContent = entries.length + ' مستخدم';
        
        if (entries.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="ph ph-users"></i>
                    <p>لا يوجد مستخدمين مسجلين بعد</p>
                </div>
            `;
            return;
        }
        
        // ترتيب المستخدمين من الأحدث للأقدم
        entries.sort((a, b) => {
            const dateA = a[1].registeredAt || '';
            const dateB = b[1].registeredAt || '';
            return dateB.localeCompare(dateA);
        });
        
        container.innerHTML = entries.map(([userId, user]) => {
            const initial = (user.name || 'م')[0].toUpperCase();
            const regDate = user.registeredAt 
                ? new Date(user.registeredAt).toLocaleDateString('ar-JO', { year: 'numeric', month: 'short', day: 'numeric' })
                : 'غير معروف';
            
            return `
                <div class="user-card" id="user-card-${userId}">
                    <div class="user-header">
                        <div class="user-avatar">${initial}</div>
                        <div class="user-info">
                            <div class="user-name">${user.name || 'بدون اسم'}</div>
                            <div class="user-phone"><i class="ph ph-phone"></i> ${user.phone || 'بدون رقم'}</div>
                        </div>
                    </div>
                    <div class="user-details">
                        <div>🆔 معرف الحساب<span>${userId}</span></div>
                        <div>📅 تاريخ التسجيل<span>${regDate}</span></div>
                    </div>
                    <div class="user-actions">
                        <button class="btn btn-sm btn-danger" onclick="deleteUserConfirm('${userId}', '${(user.name || 'المستخدم').replace(/'/g, "\\'")}')">
                            <i class="ph ph-trash"></i> حذف المستخدم
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function deleteUserConfirm(userId, name) {
        if (!confirm(`هل أنت متأكد من حذف "${name}"؟\n\nسيتم حذف جميع بياناته وسيُطلب منه التسجيل مرة أخرى.`)) return;
        
        try {
            await db.ref('users/' + userId).remove();
            tg.showAlert('✅ تم حذف المستخدم بنجاح!');
            loadUsers();
            loadStats();
        } catch(e) {
            tg.showAlert('❌ خطأ في حذف المستخدم: ' + e.message);
        }
    }

    // ============ الإضافة ============
    async function showAddForm(type) {
        showScreen('addScreen');
        await loadData();
        let html = '';
        
        if (type === 'governorate') {
            html = `
                <h3 style="margin-bottom:16px;">➕ إضافة محافظة</h3>
                <div class="form-group"><label class="form-label">اسم المحافظة</label><input type="text" class="form-input" id="govName"></div>
                <button class="btn btn-primary" onclick="addGovernorate()">حفظ</button>
            `;
        } else if (type === 'area') {
            const govOptions = Object.entries(allGovs).map(([id, g]) => `<option value="${id}">${g.name}</option>`).join('');
            html = `
                <h3 style="margin-bottom:16px;">➕ إضافة منطقة</h3>
                <div class="form-group"><label class="form-label">المحافظة</label><select class="form-input" id="areaGov">${govOptions}</select></div>
                <div class="form-group"><label class="form-label">اسم المنطقة</label><input type="text" class="form-input" id="areaName"></div>
                <button class="btn btn-primary" onclick="addArea()">حفظ</button>
            `;
        } else if (type === 'center') {
            const govOptions = Object.entries(allGovs).map(([id, g]) => `<option value="${id}">${g.name}</option>`).join('');
            html = `
                <h3 style="margin-bottom:16px;">➕ إضافة مركز</h3>
                <div class="form-group"><label class="form-label">المحافظة</label><select class="form-input" id="centerGov" onchange="loadAreasForSelect()">${govOptions}</select></div>
                <div class="form-group"><label class="form-label">المنطقة</label><select class="form-input" id="centerArea"></select></div>
                <div class="form-group"><label class="form-label">اسم المركز</label><input type="text" class="form-input" id="centerName"></div>
                <div class="form-group"><label class="form-label">العنوان</label><input type="text" class="form-input" id="centerAddress"></div>
                <div class="form-group"><label class="form-label">رابط الخريطة</label><input type="text" class="form-input" id="centerMapLink"></div>
                <div class="form-group"><label class="form-label">رقم الهاتف</label><input type="tel" class="form-input" id="centerPhone"></div>
                <div class="form-group"><label class="form-label">التقييم (من 5)</label><input type="number" class="form-input" id="centerRating" min="0" max="5" step="0.1" value="0"></div>
                <button class="btn btn-primary" onclick="addCenter()">حفظ</button>
            `;
        }
        
        document.getElementById('addFormContent').innerHTML = html;
        if (type === 'center') setTimeout(loadAreasForSelect, 300);
    }

    function loadAreasForSelect() {
        const govId = document.getElementById('centerGov')?.value;
        if (!govId) return;
        const areas = Object.entries(allAreas).filter(([_, a]) => a.governorateId === govId).map(([id, a]) => ({ id, ...a }));
        const sel = document.getElementById('centerArea');
        if (sel) sel.innerHTML = areas.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    async function addGovernorate() {
        const name = document.getElementById('govName').value.trim();
        if (!name) { tg.showAlert('الرجاء إدخال اسم المحافظة'); return; }
        await db.ref('governorates').push({ name });
        tg.showAlert('✅ تمت الإضافة بنجاح!');
        showMain();
    }

    async function addArea() {
        const name = document.getElementById('areaName').value.trim();
        const governorateId = document.getElementById('areaGov').value;
        if (!name) { tg.showAlert('الرجاء إدخال اسم المنطقة'); return; }
        await db.ref('areas').push({ name, governorateId });
        tg.showAlert('✅ تمت الإضافة بنجاح!');
        showMain();
    }

    async function addCenter() {
        const name = document.getElementById('centerName').value.trim();
        const areaId = document.getElementById('centerArea').value;
        const address = document.getElementById('centerAddress').value.trim();
        const mapLink = document.getElementById('centerMapLink').value.trim();
        const phone = document.getElementById('centerPhone').value.trim();
        const rating = parseFloat(document.getElementById('centerRating').value) || 0;
        if (!name) { tg.showAlert('الرجاء إدخال اسم المركز'); return; }
        await db.ref('centers').push({ name, areaId, address, mapLink, phone, rating });
        tg.showAlert('✅ تمت الإضافة بنجاح!');
        showMain();
    }

    // ============ التعديل ============
    function showEditMenu() {
        showScreen('editScreen');
        document.getElementById('editContent').innerHTML = `
            <h3 style="margin-bottom:16px;">✏️ ماذا تريد أن تعدل؟</h3>
            <div class="selection-card" onclick="startEdit('governorates')">🏙 المحافظات</div>
            <div class="selection-card" onclick="startEdit('areas')">📍 المناطق</div>
            <div class="selection-card" onclick="startEdit('centers')">🏢 المراكز</div>
        `;
    }

    async function startEdit(type) {
        await loadData();
        let html = `<h3 style="margin-bottom:16px;">✏️ تعديل ${type === 'governorates' ? 'محافظة' : type === 'areas' ? 'منطقة' : 'مركز'}</h3>`;
        
        if (type === 'governorates') {
            const items = Object.entries(allGovs).map(([id, g]) => ({ id, ...g }));
            html += items.map(item => `
                <div class="list-item" id="edit-row-${item.id}">
                    <span id="edit-name-${item.id}">${item.name}</span>
                    <button class="btn btn-sm btn-outline" onclick="showEditInline('governorates', '${item.id}')"><i class="ph ph-pencil-simple"></i> تعديل</button>
                </div>
            `).join('');
        } else {
            const govs = Object.entries(allGovs).map(([id, g]) => ({ id, ...g }));
            html += '<p style="color:var(--text-light);margin-bottom:12px;">اختر المحافظة أولاً:</p>';
            html += govs.map(g => `
                <div class="selection-card" onclick="showItemsForEdit('${type}', '${g.id}', '${g.name}')">${g.name}</div>
            `).join('');
        }
        
        document.getElementById('editContent').innerHTML = html;
    }

    function showEditInline(type, id) {
        const nameSpan = document.getElementById(`edit-name-${id}`);
        const currentName = nameSpan.textContent;
        const row = document.getElementById(`edit-row-${id}`);
        
        row.innerHTML = `
            <input type="text" class="form-input" id="edit-input-${id}" value="${currentName.replace(/"/g, '&quot;')}" style="flex:1;height:44px;">
            <button class="btn btn-sm btn-primary" onclick="saveEditInline('${type}', '${id}')">💾 حفظ</button>
            <button class="btn btn-sm btn-outline" onclick="startEdit('${type}')">❌ إلغاء</button>
        `;
    }

    async function saveEditInline(type, id) {
        const newName = document.getElementById(`edit-input-${id}`).value.trim();
        if (!newName) { tg.showAlert('الرجاء إدخال اسم'); return; }
        const endpoint = type === 'governorates' ? 'governorates' : type === 'areas' ? 'areas' : 'centers';
        await db.ref(`${endpoint}/${id}`).update({ name: newName });
        tg.showAlert('✅ تم التعديل بنجاح!');
        startEdit(type);
    }

    async function showItemsForEdit(type, govId, govName) {
        await loadData();
        let html = `<button class="back-btn" onclick="startEdit('${type}')"><i class="ph ph-arrow-right"></i> رجوع</button>`;
        html += `<h3 style="margin-bottom:8px;">${govName}</h3>`;
        
        if (type === 'areas') {
            const items = Object.entries(allAreas).filter(([_, a]) => a.governorateId === govId).map(([id, a]) => ({ id, ...a }));
            html += items.map(item => `
                <div class="list-item" id="edit-row-${item.id}">
                    <span id="edit-name-${item.id}">${item.name}</span>
                    <button class="btn btn-sm btn-outline" onclick="showEditInline('areas', '${item.id}')"><i class="ph ph-pencil-simple"></i> تعديل</button>
                </div>
            `).join('');
        } else if (type === 'centers') {
            const areas = Object.entries(allAreas).filter(([_, a]) => a.governorateId === govId).map(([id, a]) => ({ id, ...a }));
            html += '<p style="color:var(--text-light);margin-bottom:12px;">اختر المنطقة:</p>';
            html += areas.map(a => `
                <div class="selection-card" onclick="showCentersForEdit('${a.id}', '${govName} - ${a.name}')">${a.name}</div>
            `).join('');
        }
        
        document.getElementById('editContent').innerHTML = html;
    }

    async function showCentersForEdit(areaId, title) {
        await loadData();
        const items = Object.entries(allCenters).filter(([_, c]) => c.areaId === areaId).map(([id, c]) => ({ id, ...c }));
        let html = `<button class="back-btn" onclick="showItemsForEdit('centers', '${allAreas[areaId]?.governorateId || ''}', '')"><i class="ph ph-arrow-right"></i> رجوع</button>`;
        html += `<h3 style="margin-bottom:8px;">${title}</h3>`;
        html += items.map(item => `
            <div class="list-item" id="edit-row-${item.id}">
                <span id="edit-name-${item.id}">${item.name}</span>
                <button class="btn btn-sm btn-outline" onclick="showEditInline('centers', '${item.id}')"><i class="ph ph-pencil-simple"></i> تعديل</button>
            </div>
        `).join('');
        document.getElementById('editContent').innerHTML = html;
    }

    // ============ الحذف ============
    function showDeleteMenu() {
        showScreen('deleteScreen');
        document.getElementById('deleteContent').innerHTML = `
            <h3 style="margin-bottom:16px;">🗑 ماذا تريد أن تحذف؟</h3>
            <div class="selection-card" onclick="startDelete('governorates')">🏙 المحافظات</div>
            <div class="selection-card" onclick="startDelete('areas')">📍 المناطق</div>
            <div class="selection-card" onclick="startDelete('centers')">🏢 المراكز</div>
        `;
    }

    async function startDelete(type) {
        await loadData();
        let html = `<h3 style="margin-bottom:16px;">🗑 حذف ${type === 'governorates' ? 'محافظة' : type === 'areas' ? 'منطقة' : 'مركز'}</h3>`;
        
        if (type === 'governorates') {
            const items = Object.entries(allGovs).map(([id, g]) => ({ id, ...g }));
            html += items.map(item => `
                <div class="list-item" id="delete-row-${item.id}">
                    <span>${item.name}</span>
                    <button class="btn btn-sm btn-outline" onclick="showDeleteConfirm('governorates', '${item.id}', '${item.name.replace(/'/g, "\\'")}')">🗑</button>
                </div>
            `).join('');
        } else {
            const govs = Object.entries(allGovs).map(([id, g]) => ({ id, ...g }));
            html += '<p style="color:var(--text-light);margin-bottom:12px;">اختر المحافظة أولاً:</p>';
            html += govs.map(g => `
                <div class="selection-card" onclick="showItemsForDelete('${type}', '${g.id}', '${g.name}')">${g.name}</div>
            `).join('');
        }
        
        document.getElementById('deleteContent').innerHTML = html;
    }

    function showDeleteConfirm(type, id, name) {
        const row = document.getElementById(`delete-row-${id}`);
        row.innerHTML = `
            <div class="confirm-box">
                <p style="margin-bottom:8px;">متأكد من حذف "${name}"؟</p>
                <button class="btn btn-sm btn-danger" onclick="executeDelete('${type}', '${id}')">🗑 نعم، احذف</button>
                <button class="btn btn-sm btn-outline" onclick="startDelete('${type}')" style="margin-top:8px;">❌ إلغاء</button>
            </div>
        `;
    }

    async function executeDelete(type, id) {
        try {
            if (type === 'governorates') {
                await db.ref(`governorates/${id}`).remove();
                const areasSnap = await db.ref('areas').orderByChild('governorateId').equalTo(id).once('value');
                const areas = areasSnap.val() || {};
                for (const areaId of Object.keys(areas)) {
                    const centersSnap = await db.ref('centers').orderByChild('areaId').equalTo(areaId).once('value');
                    const centers = centersSnap.val() || {};
                    for (const centerId of Object.keys(centers)) {
                        await db.ref(`centers/${centerId}`).remove();
                    }
                    await db.ref(`areas/${areaId}`).remove();
                }
            } else if (type === 'areas') {
                await db.ref(`areas/${id}`).remove();
                const centersSnap = await db.ref('centers').orderByChild('areaId').equalTo(id).once('value');
                const centers = centersSnap.val() || {};
                for (const centerId of Object.keys(centers)) {
                    await db.ref(`centers/${centerId}`).remove();
                }
            } else {
                await db.ref(`centers/${id}`).remove();
            }
            
            tg.showAlert('✅ تم الحذف بنجاح!');
            startDelete(type);
        } catch(e) {
            tg.showAlert('❌ خطأ في الحذف: ' + e.message);
        }
    }

    async function showItemsForDelete(type, govId, govName) {
        await loadData();
        let html = `<button class="back-btn" onclick="startDelete('${type}')"><i class="ph ph-arrow-right"></i> رجوع</button>`;
        html += `<h3 style="margin-bottom:8px;">${govName}</h3>`;
        
        if (type === 'areas') {
            const items = Object.entries(allAreas).filter(([_, a]) => a.governorateId === govId).map(([id, a]) => ({ id, ...a }));
            html += items.map(item => `
                <div class="list-item" id="delete-row-${item.id}">
                    <span>${item.name}</span>
                    <button class="btn btn-sm btn-outline" onclick="showDeleteConfirm('areas', '${item.id}', '${item.name.replace(/'/g, "\\'")}')">🗑</button>
                </div>
            `).join('');
        } else if (type === 'centers') {
            const areas = Object.entries(allAreas).filter(([_, a]) => a.governorateId === govId).map(([id, a]) => ({ id, ...a }));
            html += '<p style="color:var(--text-light);margin-bottom:12px;">اختر المنطقة:</p>';
            html += areas.map(a => `
                <div class="selection-card" onclick="showCentersForDelete('${a.id}', '${govName} - ${a.name}')">${a.name}</div>
            `).join('');
        }
        
        document.getElementById('deleteContent').innerHTML = html;
    }

    async function showCentersForDelete(areaId, title) {
        await loadData();
        const items = Object.entries(allCenters).filter(([_, c]) => c.areaId === areaId).map(([id, c]) => ({ id, ...c }));
        let html = `<button class="back-btn" onclick="showItemsForDelete('centers', '${allAreas[areaId]?.governorateId || ''}', '')"><i class="ph ph-arrow-right"></i> رجوع</button>`;
        html += `<h3 style="margin-bottom:8px;">${title}</h3>`;
        html += items.map(item => `
            <div class="list-item" id="delete-row-${item.id}">
                <span>${item.name}</span>
                <button class="btn btn-sm btn-outline" onclick="showDeleteConfirm('centers', '${item.id}', '${item.name.replace(/'/g, "\\'")}')">🗑</button>
            </div>
        `).join('');
        document.getElementById('deleteContent').innerHTML = html;
    }

    // ============ بدء التشغيل ============
    loadStats();
</script>
